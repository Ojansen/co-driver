name: dockerhub-readme

# Syncs README.md to the Docker Hub repo overview without needing a release.
# Used for README-only tweaks; release builds in docker-publish.yml do the
# same sync as part of a tag push.

on:
  push:
    branches: [main]
    paths: [README.md]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: obedbj/co-driver
          short-description: ${{ github.event.repository.description }}
          readme-filepath: ./README.md
